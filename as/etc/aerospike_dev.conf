# Aerospike database developer configuration file.

service {
	run-as-daemon false # To work with gdb, and make console logging visible.

	# The number of concurrent connections to the database is limited by
	# proto-fd-max, and by the system's maximum number of open file descriptors.
	# See "man limits.conf" for how to set the system's "nofile" limit.
	proto-fd-max 1024

	work-directory run/work
	cluster-name cakery
}

mod-lua {
	user-path run/work/usr/udf/lua
}

logging {
	# Log file must be an absolute path.
	file run/log/aerospike.log {
		context any info
	}

	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		port 3002 # Heartbeat port for this node.

		# List one or more other nodes, one ip-address & port per line:
		mesh-seed-address-port 10.10.10.10 3002
#		mesh-seed-address-port 10.10.10.11 3002
#		mesh-seed-address-port 10.10.10.12 3002
#		mesh-seed-address-port 10.10.10.13 3002
#		mesh-seed-address-port 10.10.10.14 3002

		interval 150
		timeout 10
	}

	fabric {
		port 3001
	}
	
	admin {
		address any
		port 3003
	}
}

namespace test {
	replication-factor 2

	storage-engine memory {
		data-size 4G
	}
}

# AeroStream: required namespace for stream logs, consumer offsets, and config.
# Sets created automatically on first write: log, consumer_offsets, config.
# Adjust storage-engine and data-size for your environment.
namespace aerostream {
	replication-factor 1

	# Secondary index on the "ts" bin of the log set — used for timestamp seeks.
	# Enable before starting the server if SEEK_TIMESTAMP is needed.
	# sindex-type flash

	storage-engine memory {
		data-size 4G
	}
}

# NOTE: Aerospike Community Edition allows a maximum of 2 namespaces.
# The example 'bar' namespace was removed to make room for 'aerostream'.
